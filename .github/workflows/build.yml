name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          cd /tmp
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qq cmdline-tools.zip
          mkdir -p $HOME/android/cmdline-tools
          mv cmdline-tools $HOME/android/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME > /dev/null 2>&1 || true

      - name: Download Gradle
        run: |
          curl -sL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -qq /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ${{ github.workspace }}
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleRelease --no-daemon --stacktrace 2>&1 | tail -100

      - uses: actions/upload-artifact@v4
        with:
          name: TsPlayer-APK
          path: app/build/outputs/apk/release/*.apk
